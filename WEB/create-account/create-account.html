<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>PRISM – Create Account</title>
    <link rel="icon" type="image/png" href="/images/prism.favicon.png">

<!-- CSS -->

    <link rel="stylesheet" href="/web/create-account/create-account.css">

</head>

<body>

<!-- Stars Background -->

  <div class="stars-container" id="stars"></div>

<!-- Login panel -->

  <div class="login-box">

    <h2>Create Your Account</h2>

    <button class="social-btn google">
      <img src="/images/google.png" alt="Google">
      Sign up with Google
    </button>

    <button class="social-btn facebook">
      <img src="/images/facebook.png" alt="Facebook">
      Sign up with Facebook
    </button>

    <div class="divider"></div>

    <input type="name" placeholder="Full Name">
    <input type="email" placeholder="Email address">
    <input type="password" placeholder="Password">

    <button class="login-btn">CREATE ACCOUNT</button>

    <p class="signup">
       Already have an account?
      <a href="/web/login/login.html">Login</a>
    </p>
  </div>

  <footer>
    <ul class="footer-links">
        <p>© prism.ph</p>

        <p> • </p>
        <li> <a href="/web/faqs/faqs.html"> FAQs </a> </li>
        <p> • </p>
        <li> <a href="/web/about/about.html"> About</a> </li>
    </ul>
</footer>

<!-- JavaScript  -->

    <script src="/web/create-account/create-account.js"></script>

</body>

</html>
