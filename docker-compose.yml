version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: prism-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://prism:prism@postgres:5432/prism}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      PORT: ${PORT:-3000}
      NODE_ENV: production
    ports:
      - "3000:3000"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: prism-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@prism.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"

volumes:
  postgres_data:
